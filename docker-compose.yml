version: '3.8'

name: fluow-control-center

services:
  postgres:
    image: postgres:16-alpine
    container_name: fluow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fluow_control
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fluow-network

  redis:
    image: redis:7-alpine
    container_name: fluow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fluow-network

  minio:
    image: minio/minio:latest
    container_name: fluow-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fluow-network

  control-center:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluow-control-center
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fluow_control
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
      JWT_SECRET: change-this-jwt-secret-in-production
      FLUOW_AGENT_URL: http://fluow-agent:3001
      FLUOW_AGENT_API_KEY: fluow-agent-secret-key-change-in-production
      INTERNAL_API_KEY: fluow-internal-secret-key-change-in-production
      APP_URL: http://localhost:3000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fluow-network
    restart: unless-stopped

  fluow-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: fluow-agent
    ports:
      - "3001:3001"
    environment:
      FLUOW_AGENT_PORT: 3001
      FLUOW_AGENT_API_KEY: fluow-agent-secret-key-change-in-production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - fluow-network
    restart: unless-stopped

  metrics-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: fluow-metrics-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fluow_control
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
      FLUOW_AGENT_URL: http://fluow-agent:3001
      FLUOW_AGENT_API_KEY: fluow-agent-secret-key-change-in-production
      INTERNAL_API_KEY: fluow-internal-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fluow-network
    restart: unless-stopped

  alert-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: fluow-alert-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fluow_control
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
      FLUOW_AGENT_URL: http://fluow-agent:3001
      FLUOW_AGENT_API_KEY: fluow-agent-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fluow-network
    restart: unless-stopped

networks:
  fluow-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
