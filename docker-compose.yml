name: fluow-control-center

services:

  redis:
    image: redis:7-alpine
    container_name: fluow-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - v5company1
    restart: unless-stopped

  control-center:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluow-control-center
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}
      FLUOW_AGENT_URL: http://fluow-agent:3001
      FLUOW_AGENT_API_KEY: ${FLUOW_AGENT_API_KEY:?FLUOW_AGENT_API_KEY is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      APP_URL: ${APP_URL:-https://noc.v5company.com.br}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - v5company1
    restart: unless-stopped

  fluow-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: fluow-agent
    environment:
      FLUOW_AGENT_PORT: 3001
      FLUOW_AGENT_API_KEY: ${FLUOW_AGENT_API_KEY:?FLUOW_AGENT_API_KEY is required}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - v5company1
    restart: unless-stopped

  metrics-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: fluow-metrics-worker
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: redis://redis:6379
      FLUOW_AGENT_URL: http://fluow-agent:3001
      FLUOW_AGENT_API_KEY: ${FLUOW_AGENT_API_KEY:?FLUOW_AGENT_API_KEY is required}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      WORKER_TARGET: server/workers/metrics.ts
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - v5company1
    restart: unless-stopped

  alert-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: fluow-alert-worker
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: redis://redis:6379
      FLUOW_AGENT_URL: http://fluow-agent:3001
      FLUOW_AGENT_API_KEY: ${FLUOW_AGENT_API_KEY:?FLUOW_AGENT_API_KEY is required}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      WORKER_TARGET: server/workers/alerts.ts
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - v5company1
    restart: unless-stopped

volumes:
  redis_data:

networks:
  v5company1:
    driver: bridge
