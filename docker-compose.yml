name: fluow-control-center

services:

  redis:
    image: redis:7-alpine
    container_name: fluow-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fluow-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: fluow-minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - fluow-network
    restart: unless-stopped

  control-center:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluow-control-center
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_USE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}
      FLUOW_AGENT_URL: http://fluow-agent:3001
      FLUOW_AGENT_API_KEY: ${FLUOW_AGENT_API_KEY:?FLUOW_AGENT_API_KEY is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      APP_URL: ${APP_URL:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fluow-network
    restart: unless-stopped

  fluow-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: fluow-agent
    environment:
      FLUOW_AGENT_PORT: 3001
      FLUOW_AGENT_API_KEY: ${FLUOW_AGENT_API_KEY:?FLUOW_AGENT_API_KEY is required}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - fluow-network
    restart: unless-stopped

  metrics-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: fluow-metrics-worker
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_USE_SSL: "false"
      FLUOW_AGENT_URL: http://fluow-agent:3001
      FLUOW_AGENT_API_KEY: ${FLUOW_AGENT_API_KEY:?FLUOW_AGENT_API_KEY is required}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      WORKER_TARGET: server/workers/metrics.ts
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fluow-network
    restart: unless-stopped

  alert-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: fluow-alert-worker
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_USE_SSL: "false"
      FLUOW_AGENT_URL: http://fluow-agent:3001
      FLUOW_AGENT_API_KEY: ${FLUOW_AGENT_API_KEY:?FLUOW_AGENT_API_KEY is required}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      WORKER_TARGET: server/workers/alerts.ts
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fluow-network
    restart: unless-stopped

volumes:
  redis_data:
  minio_data:
